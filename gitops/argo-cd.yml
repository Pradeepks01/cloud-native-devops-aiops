apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Pradeepks01/cloud-native-devops-aiops.git'
    targetRevision: main
    path: gitops
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ecommerce
  syncPolicy: {}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
