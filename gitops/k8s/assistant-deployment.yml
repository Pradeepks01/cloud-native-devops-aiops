apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-assistant
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-assistant
  template:
    metadata:
      labels:
        app: aiops-assistant
    spec:
      containers:
      - name: assistant
        image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/aiops-assistant:latest
        ports:
        - containerPort: 8501
        env:
        - name: BEDROCK_AGENT_ID
          valueFrom:
            secretKeyRef:
              name: assistant-secrets
              key: BEDROCK_AGENT_ID
        - name: BEDROCK_AGENT_ALIAS_ID
          valueFrom:
            secretKeyRef:
              name: assistant-secrets
              key: BEDROCK_AGENT_ALIAS_ID
        - name: AWS_REGION
          value: "eu-north-1"
        resources:
          requests:
            cpu: "256m"
            memory: "512Mi"
          limits:
            cpu: "512m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 15
          periodSeconds: 5
